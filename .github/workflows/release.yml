name: Release Apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run dist:mac
            artifact: weather-watch-macos
          - name: Windows
            os: windows-latest
            command: npm run dist:win
            artifact: weather-watch-windows
          - name: Linux
            os: ubuntu-latest
            command: npm run dist:linux
            artifact: weather-watch-linux

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Assess macOS release credentials
        id: mac_credentials
        if: matrix.name == 'macOS'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
        run: |
          mkdir -p release

          SIGNING_READY=false
          NOTARIZATION_READY=false

          if [[ -z "$CSC_LINK" || -z "$CSC_KEY_PASSWORD" ]]; then
            echo "::warning::macOS signed release package unavailable: missing MAC_CSC_LINK and/or MAC_CSC_KEY_PASSWORD secrets for Developer ID signing. Building unsigned macOS test zips instead."
          else
            SIGNING_READY=true
          fi

          if [[ -n "$APPLE_API_KEY" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" ]]; then
            NOTARIZATION_READY=true
          fi

          if [[ -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            NOTARIZATION_READY=true
          fi

          if [[ -n "$APPLE_KEYCHAIN" && -n "$APPLE_KEYCHAIN_PROFILE" ]]; then
            NOTARIZATION_READY=true
          fi

          if [[ "$NOTARIZATION_READY" != "true" ]]; then
            echo "::warning::macOS signed release package unavailable: missing notarization secrets. Building unsigned macOS test zips instead."
          fi

          if [[ "$SIGNING_READY" == "true" && "$NOTARIZATION_READY" == "true" ]]; then
            echo "can_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat > release/macos-signing-required.txt <<'EOF'
          Unsigned macOS test packages are included in this release.

          These zips contain a real Weather Watch.app for Intel and Apple Silicon Macs, but they are not signed or notarized. macOS may block them until the user explicitly trusts the app or removes the quarantine flag.

          To test manually:
          1. Download and unzip the macOS file for your Mac.
          2. Move Weather Watch.app into /Applications.
          3. Right-click Weather Watch.app and choose Open.
          4. If macOS still blocks it, run:
             xattr -dr com.apple.quarantine "/Applications/Weather Watch.app"

          Public macOS releases should still be signed with an Apple Developer ID certificate and notarized by Apple. Releasing an unsigned macOS app can make Gatekeeper show "Weather Watch is damaged and can't be opened."

          Add these GitHub repository secrets to enable Intel and Apple Silicon macOS builds:
          - MAC_CSC_LINK
          - MAC_CSC_KEY_PASSWORD

          Also add one notarization credential set:
          - APPLE_API_KEY, APPLE_API_KEY_ID, APPLE_API_ISSUER
          - or APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          - or APPLE_KEYCHAIN, APPLE_KEYCHAIN_PROFILE

          After the secrets are configured, rerun this release workflow or push a new version tag.
          EOF
          sed -i.bak 's/^          //' release/macos-signing-required.txt
          rm release/macos-signing-required.txt.bak
          echo "can_build=false" >> "$GITHUB_OUTPUT"

      - name: Build desktop package
        if: matrix.name != 'macOS' || steps.mac_credentials.outputs.can_build == 'true'
        run: ${{ matrix.command }}
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}

      - name: Build unsigned macOS test package
        if: matrix.name == 'macOS' && steps.mac_credentials.outputs.can_build != 'true'
        run: npm run dist:mac:unsigned
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.zip
            release/*.blockmap
            release/latest*.yml
            release/macos-signing-required.txt
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Build Android APK
        shell: bash
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Prepare Android artifact
        shell: bash
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/Weather-Watch-${TAG}-android-debug.apk"
          cat > release/android-apk-note.txt <<'EOF'
          Android APK status:

          This release includes a debug-signed Android APK for sideload testing.
          A production Android release should be signed with a dedicated upload/release keystore.
          EOF
          sed -i 's/^          //' release/android-apk-note.txt

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-watch-android
          path: |
            release/*.apk
            release/android-apk-note.txt
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - build
      - build-android
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release notes
        shell: bash
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          {
            echo "Weather Watch ${TAG}"
            echo
            echo "Desktop packages and Android APK produced by GitHub Actions."
            if find artifacts -name macos-signing-required.txt -print -quit | grep -q .; then
              echo
              echo "macOS package status:"
              cat "$(find artifacts -name macos-signing-required.txt -print -quit)"
            fi
            if find artifacts -name android-apk-note.txt -print -quit | grep -q .; then
              echo
              cat "$(find artifacts -name android-apk-note.txt -print -quit)"
            fi
          } > RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          files: artifacts/**/*
